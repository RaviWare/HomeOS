# Cloudflare Workers config for HomeOS
# Deploy: npm run cf:deploy (runs: vite build && wrangler deploy)
# Set the secret first: npx wrangler secret put ANTHROPIC_API_KEY
name = "homeos"
main = "worker/index.ts"
compatibility_date = "2025-05-01"

# Serve the built Vite SPA from ./dist; the Worker handles /api/* and /healthz first.
[assets]
directory = "./dist"
binding = "ASSETS"
run_worker_first = true
not_found_handling = "single-page-application"

# Non-secret config (ANTHROPIC_API_KEY is set as a secret, not here).
[vars]
ANTHROPIC_MODEL = "claude-haiku-4-5"
AI_ENABLED = "true"
AI_DAILY_LIMIT = "300"
AI_RATE_MAX = "20"
